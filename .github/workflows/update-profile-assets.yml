name: Update profile assets

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:17 UTC.
    - cron: "17 6 * * 1"

permissions:
  contents: write

concurrency:
  group: profile-assets
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the profile repository
        uses: actions/checkout@v6

      - name: Generate local profile SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: python scripts/generate_profile_assets.py

      - name: Commit refreshed assets
        run: |
          if git diff --quiet -- assets/profile-stats-*.svg assets/activity-*.svg; then
            echo "Profile assets are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-stats-*.svg assets/activity-*.svg
          git commit -m "chore: refresh profile metrics"
          git push
